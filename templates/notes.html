{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 900px; margin: 0 auto; padding: 40px 20px;">
    <a href="{{ url_for('dashboard') }}" style="color: var(--accent-purple); text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 20px;">← Back to Dashboard</a>
    
    <div class="glass-card" style="padding: 40px; border-radius: 28px; background: rgba(25, 25, 35, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.3);">
        <h1 style="margin-top: 0; color: var(--accent-purple); font-size: 2.2rem;">🧠 AI Notes Simplifier</h1>
        <p style="color: var(--text-dim); margin-bottom: 30px;">Upload your textbook or any large PDF. AI will break it down into simple, high-yield study notes.</p>
        
        <form action="{{ url_for('summarize_pdf') }}" method="POST" enctype="multipart/form-data" style="background: rgba(255,255,255,0.03); padding: 30px; border-radius: 20px; border: 1px dashed rgba(192, 132, 252, 0.4);">
            <input type="file" name="pdf_file" accept=".pdf" required style="width: 100%; padding: 15px; color: white; margin-bottom: 20px;">
            <button type="submit" class="btn-glow" style="width: 100%; padding: 15px; background: var(--accent-purple); color: black; border: none; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer;">
                ✨ Simplify This PDF
            </button>
        </form>

        {% if notes %}
            <div style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: var(--accent-purple); margin: 0;">Your Simplified Notes</h2>
                    <button onclick="copyNotes()" style="background: rgba(192, 132, 252, 0.2); border: 1px solid var(--accent-purple); color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer;">Copy 📋</button>
                </div>
                <div id="notes-content" style="color: #eee; line-height: 1.8; font-size: 1.05rem; background: rgba(0,0,0,0.2); padding: 25px; border-radius: 15px;">
                    {{ notes | safe }}
                </div>
            </div>
        {% endif %}
    </div>
</div>

<script>
function copyNotes() {
    const text = document.getElementById('notes-content').innerText;
    navigator.clipboard.writeText(text);
    alert("Scholar, your notes are copied!");
}
</script>
{% endblock %}
