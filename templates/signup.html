{% extends "base.html" %}
{% block content %}
<div class="auth-card">
    <div class="sticker-icon">✨</div>
    
    <h2>Create Account</h2>
    
    <form action="{{ url_for('signup') }}" method="POST">
        <div class="input-container">
            <label>Username</label>
            <input type="text" name="username" placeholder="Pick a username" required>
        </div>
        
        <div class="input-container">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>
        
        <div class="input-container">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-pristd">Register Now 🚀</button>
    </form>
    
    <div class="auth-footer" style="margin-top: 30px;">
        Already a member? <a href="{{ url_for('login') }}" style="color: var(--accent-purple); text-decoration: none; font-weight: bold;">Login here</a>
    </div>
</div>
{% endblock %}
